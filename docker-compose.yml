  ########################
  # FRONTEND FLASK
  ########################
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: ${FRONTEND_INSTANCE_HOSTNAME}
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_CONTAINER_PORT}"
    depends_on:
      gateway:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    environment:
      - AUTH_SERVICE_BASE_URL=${AUTH_SERVICE_BASE_URL}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - GATEWAY_CLIENT_ID=${GATEWAY_CLIENT_ID}
      - GATEWAY_CLIENT_SECRET=${GATEWAY_CLIENT_SECRET}
    networks:
      - smartgym-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent http://localhost:${FRONTEND_CONTAINER_PORT}/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ########################
  # MQTT BROKER
  ########################
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ${MQTT_BROKER_HOST}
    ports:
      - "${MQTT_BROKER_PORT}:1883"
    environment:
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    command:
      - /bin/sh
      - -ec
      - |
        rm -f /mosquitto/config/passwordfile
        mosquitto_passwd -b -c /mosquitto/config/passwordfile "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        chown mosquitto:mosquitto /mosquitto/config/passwordfile
        chmod 640 /mosquitto/config/passwordfile
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - smartgym-net
    restart: unless-stopped

  ########################
  # GO SIMULATOR
  ########################
  simulator:
    build:
      context: ./src/simulator
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: smartgym-simulator
    depends_on:
      gateway:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - smartgym-net
    environment:
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT}
      - MQTT_BROKER_PROTOCOL=${MQTT_BROKER_PROTOCOL}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_TOPIC=${MQTT_TOPIC}
    restart: unless-stopped

