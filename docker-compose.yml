version: "3.9"

services:
  ##############################
  # EUREKA SERVICE DISCOVERY
  ##############################
  service-discovery:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      args:
        SERVICE: service-discovery
    env_file:
      - .env
    container_name: ${EUREKA_INSTANCE_HOSTNAME}
    ports:
      - "${EUREKA_INSTANCE_PORT}:${EUREKA_INSTANCE_PORT}"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=${EUREKA_CLIENT_REGISTER_WITH_EUREKA}
      - EUREKA_CLIENT_FETCH_REGISTRY=${EUREKA_CLIENT_FETCH_REGISTRY}
      - EUREKA_INSTANCE_HOSTNAME=${EUREKA_INSTANCE_HOSTNAME}
      - EUREKA_INSTANCE_PORT=${EUREKA_INSTANCE_PORT}
    networks:
      - ${SMARTGYM_NETWORK}

  #####################
  # API GATEWAY
  #####################
  gateway:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    env_file:
      - .env
    container_name: ${API_GATEWAY_INSTANCE_HOSTNAME}
    ports:
      - "${API_GATEWAY_INSTANCE_PORT}:${API_GATEWAY_INSTANCE_PORT}"
    depends_on:
      - service-discovery
    networks:
      - ${SMARTGYM_NETWORK}

  #####################
  # AUTH SERVICE
  #####################
  auth-service:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    env_file:
      - .env
    container_name: ${AUTH_SERVICE_INSTANCE_HOSTNAME}
    ports:
      - "${AUTH_SERVICE_INSTANCE_PORT}:${AUTH_SERVICE_INSTANCE_PORT}"
    depends_on:
      - service-discovery
      - mongo-auth
    environment:
      - SPRING_DATA_MONGODB_URI=${AUTH_MONGODB_URI}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
    networks:
      - ${SMARTGYM_NETWORK}

  mongo-auth:
    image: mongo:7
    container_name: ${AUTH_MONGODB_HOST}
    ports:
      - "${AUTH_MONGODB_PORT}:27017"
    volumes:
      - mongo-auth-data:/data/db
    networks:
      - ${SMARTGYM_NETWORK}

  ########################
  # ANALYTICS SERVICE
  ########################
  analytics-service:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      args:
        SERVICE: analytics-service
    env_file:
      - .env
    container_name: ${ANALYTICS_SERVICE_INSTANCE_HOSTNAME}
    ports:
      - "${ANALYTICS_SERVICE_INSTANCE_PORT}:${ANALYTICS_SERVICE_INSTANCE_PORT}"
    depends_on:
      - service-discovery
      - mongo-analytics
    environment:
      - SPRING_DATA_MONGODB_URI=${ANALYTICS_MONGODB_URI}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
    networks:
      - ${SMARTGYM_NETWORK}

  mongo-analytics:
    image: mongo:7
    container_name: ${ANALYTICS_MONGODB_HOST}
    ports:
      - "${ANALYTICS_MONGODB_PORT}:27017"
    volumes:
      - mongo-analytics-data:/data/db
    networks:
      - ${SMARTGYM_NETWORK}

volumes:
  mongo-auth-data:
  mongo-analytics-data:

networks:
  smartgym-net:
    driver: bridge
