#    image: prom/prometheus:latest
#    container_name: ${PROMETHEUS_INSTANCE_HOSTNAME}
#    ports:
#      - "${PROMETHEUS_INSTANCE_PORT}:${PROMETHEUS_INSTANCE_PORT}"
#    networks:
#      - ${SMARTPARKING_NETWORK}
#    volumes:
#      - ./prometheus.yml:/etc/prometheus/prometheus.yml
