services:
  ##############################
  # EUREKA SERVICE DISCOVERY
  ##############################
  service-discovery:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      args:
        SERVICE: service-discovery
    env_file:
      - .env
    container_name: ${EUREKA_INSTANCE_HOSTNAME}
    ports:
      - "${EUREKA_INSTANCE_PORT}:${EUREKA_INSTANCE_PORT}"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=${EUREKA_CLIENT_REGISTER_WITH_EUREKA}
      - EUREKA_CLIENT_FETCH_REGISTRY=${EUREKA_CLIENT_FETCH_REGISTRY}
      - EUREKA_INSTANCE_HOSTNAME=${EUREKA_INSTANCE_HOSTNAME}
      - EUREKA_INSTANCE_PORT=${EUREKA_INSTANCE_PORT}
    networks:
      - smartgym-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent http://localhost:${EUREKA_INSTANCE_PORT}/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  #####################
  # API GATEWAY
  #####################
  gateway:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    env_file:
      - .env
    container_name: ${API_GATEWAY_INSTANCE_HOSTNAME}
    ports:
      - "${API_GATEWAY_INSTANCE_PORT}:${API_GATEWAY_INSTANCE_PORT}"
    depends_on:
      service-discovery:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      - EUREKA_INSTANCE_HOSTNAME=${API_GATEWAY_INSTANCE_HOSTNAME}
      - EUREKA_INSTANCE_PORT=${API_GATEWAY_INSTANCE_PORT}
    networks:
      - smartgym-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent http://localhost:${API_GATEWAY_INSTANCE_PORT}/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  #####################
  # AUTH SERVICE
  #####################
  auth-service:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    env_file:
      - .env
    container_name: ${AUTH_SERVICE_INSTANCE_HOSTNAME}
    ports:
      - "${AUTH_SERVICE_INSTANCE_PORT}:${AUTH_SERVICE_INSTANCE_PORT}"
    depends_on:
      service-discovery:
        condition: service_healthy
      mongo-auth:
        condition: service_healthy
    environment:
      - SPRING_DATA_MONGODB_URI=${AUTH_MONGODB_URI}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
      - EUREKA_CLIENT_FETCH_REGISTRY=true
    networks:
      - smartgym-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent http://localhost:${AUTH_SERVICE_INSTANCE_PORT}/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mongo-auth:
    image: mongo:7
    container_name: ${AUTH_MONGODB_HOST}
    ports:
      - "27017:${AUTH_MONGODB_PORT}"
    volumes:
      - mongo-auth-data:${MONGODB_VOLUME_PATH}
    networks:
      - smartgym-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --eval "db.adminCommand(''ping'').ok" mongodb://localhost:${AUTH_MONGODB_PORT}/admin | grep 1 || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

