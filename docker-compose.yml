      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: smartgym-frontend
    ports:
      - "5001:5000"
    depends_on:
      - auth-service
    environment:
      - AUTH_SERVICE_BASE_URL=http://auth-service:${AUTH_SERVICE_INSTANCE_PORT}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-dev}
    networks:
      - smartgym-net
    healthcheck:
      test:
