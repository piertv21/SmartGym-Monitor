global:
  scrape_interval: 5s

scrape_configs:
  #Services / Infrastructure
  - job_name: "analytics-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["analytics-service:8085"]

  - job_name: "auth-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["auth-service:8081"]

  - job_name: "gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: "service-discovery"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["service-discovery:8761"]

  - job_name: "area-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["area-service:8086"]

  - job_name: "machine-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["machine-service:8084"]

  - job_name: "tracking-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["tracking-service:8087"]

  - job_name: "embedded-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["embedded-service:8088"]
