name: CI E2E

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  docker-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare env file
        run: cp .env.example .env

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./src/backend/gradlew

      - name: Build Docker images
        run: |
          docker compose build \
            service-discovery \
            gateway \
            auth-service \
            analytics-service \
            area-service \
            machine-service \
            tracking-service \
            embedded-service \
            frontend \
            simulator

      - name: Start infrastructure
        run: docker compose up -d

      - name: Wait for gateway health
        run: |
          for i in $(seq 1 50); do
            if curl --fail --silent http://localhost:8080/actuator/health >/dev/null; then
              echo "Gateway is healthy"
              exit 0
            fi
            echo "[$i/50] waiting for gateway..."
            sleep 5
          done
          echo "Gateway did not become healthy in time"
          docker compose logs gateway | tail -n 200 || true
          exit 1

      - name: Run E2E tests
        run: ./src/backend/gradlew --no-daemon -p src/backend :e2e:test --info

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-junit-reports
          path: src/backend/e2e/build/test-results/test/*.xml
          if-no-files-found: warn

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-html-report
          path: src/backend/e2e/build/reports/tests/test/
          if-no-files-found: warn

      - name: Save docker compose logs
        if: always()
        run: docker compose logs --no-color > docker-compose.log || true

      - name: Upload docker compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: docker-compose.log
          if-no-files-found: warn

      - name: Cleanup infrastructure
        if: always()
        run: docker compose down -v --remove-orphans || true
