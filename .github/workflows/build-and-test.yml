name: Build and Test

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/frontend/poetry.lock

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Run frontend tests
        working-directory: ./src/frontend
        run: |
          python -m poetry install --no-interaction --no-root
          python -m poetry run pytest -q

  test-integration-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare env file
        run: cp .env.example .env

      - name: Grant execute permission to Gradle wrapper
        run: chmod +x ./src/backend/gradlew

      - name: Build minimal backend images
        run: |
          docker compose build --parallel \
            service-discovery \
            gateway \
            auth-service \
            analytics-service \
            area-service \
            machine-service \
            tracking-service \
            embedded-service

      - name: Start minimal infrastructure for integration and e2e
        run: |
          docker compose up -d --no-build \
            service-discovery \
            gateway \
            auth-service \
            analytics-service \
            area-service \
            machine-service \
            tracking-service \
            embedded-service \
            mosquitto \
            mongo-seed

      - name: Wait for backend services health
        run: |
          wait_for_health() {
            local service_name="$1"
            local health_url="$2"

            for i in $(seq 1 50); do
              if curl --fail --silent "$health_url" >/dev/null; then
                echo "$service_name is healthy"
                return 0
              fi
              echo "[$i/50] waiting for $service_name..."
              sleep 5
            done

            echo "$service_name did not become healthy in time"
            return 1
          }

          failed=0
          wait_for_health "service-discovery" "http://localhost:8761/actuator/health" || failed=1
          wait_for_health "gateway" "http://localhost:8080/actuator/health" || failed=1
          wait_for_health "auth-service" "http://localhost:8081/actuator/health" || failed=1
          wait_for_health "analytics-service" "http://localhost:8085/actuator/health" || failed=1
          wait_for_health "area-service" "http://localhost:8086/actuator/health" || failed=1
          wait_for_health "machine-service" "http://localhost:8084/actuator/health" || failed=1
          wait_for_health "tracking-service" "http://localhost:8087/actuator/health" || failed=1
          wait_for_health "embedded-service" "http://localhost:8088/actuator/health" || failed=1

          if [ "$failed" -ne 0 ]; then
            docker compose logs --no-color --tail=300 \
              service-discovery gateway auth-service analytics-service area-service machine-service tracking-service embedded-service || true
            exit 1
          fi

      - name: Run backend JUnit + integration tests (microservices only)
        working-directory: ./src/backend
        env:
          SMARTGYM_IT_ENABLED: "true"
        run: |
          ./gradlew --no-daemon \
            :service-discovery:test \
            :gateway:test \
            :auth-service:test \
            :analytics-service:test \
            :area-service:test \
            :machine-service:test \
            :tracking-service:test \
            :embedded-service:test

      - name: Run backend e2e tests (e2e module only)
        working-directory: ./src/backend
        run: ./gradlew :e2e:test --no-daemon --info

      - name: Upload backend/e2e JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-junit-reports
          path: src/backend/**/build/test-results/test/*.xml
          if-no-files-found: warn

      - name: Upload e2e HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-html-report
          path: src/backend/e2e/build/reports/tests/test/
          if-no-files-found: warn

      - name: Save docker compose logs
        if: always()
        run: docker compose logs --no-color > docker-compose.log || true

      - name: Upload docker compose logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: docker-compose.log
          if-no-files-found: warn

      - name: Cleanup infrastructure
        if: always()
        run: docker compose down -v --remove-orphans || true
