global:
  scrape_interval: 5s

scrape_configs:
  #Services / Infrastructure
  - job_name: "analytics-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["analytics-service:8085"]

  - job_name: "embedded-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["embedded-service:8086"]

  - job_name: "ticketing-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ticketing-service:8084"]

  - job_name: "payment-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["payment-service:8083"]

  - job_name: "parking-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["parking-service:8082"]

  - job_name: "auth-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["auth-service:8081"]

  - job_name: "gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: "service-discovery"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["service-discovery:8761"]

  #mongo db
