  #    networks:
  #      - ${SMARTGYM_NETWORK}

  #####################
  # PROMETHEUS        #
  #####################
  prometheus:
    image: prom/prometheus:latest
    container_name: ${PROMETHEUS_INSTANCE_HOSTNAME}
    ports:
      - "${PROMETHEUS_INSTANCE_PORT}:${PROMETHEUS_INSTANCE_PORT}"
    networks:
      - ${SMARTGYM_NETWORK}
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      gateway:
        condition: service_healthy

  #####################
  # GRAFANA           #
  #####################
  grafana:
    image: grafana/grafana
    container_name: ${GRAFANA_INSTANCE_HOSTNAME}
    ports:
      - "${GRAFANA_INSTANCE_PORT}:${GRAFANA_INSTANCE_PORT}"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    networks:
      - ${SMARTGYM_NETWORK}
    depends_on:
      - prometheus

#############################
# VOLUMES AND NETWORKS      #
#############################
volumes:
  mongo-auth-data:
  mongo-parking-data:
  mongo-payment-data:
  mongo-ticketing-data:
  mongo-analytics-data:
  mongo-embedded-data:

networks:
  smartgym-net:
    driver: bridge
