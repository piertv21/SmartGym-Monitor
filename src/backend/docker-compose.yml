  #      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  #    networks:
  #      - ${SMARTGYM_NETWORK}
  #    healthcheck:
  #      test: curl --fail http://localhost:${PARKING_SERVICE_INSTANCE_PORT}/actuator/health || exit 1
