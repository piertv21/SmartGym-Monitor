server:
  port: ${MACHINE_SERVICE_INSTANCE_PORT:8084}

spring:
  application:
    name: ${MACHINE_SERVICE_INSTANCE_HOSTNAME:machine-service}
  data:
    mongodb:
      uri: ${MACHINE_MONGODB_URI:mongodb://localhost:27017/machineservicedb}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://service-discovery:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${MACHINE_SERVICE_INSTANCE_HOSTNAME:machine-service}
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}

management:
  server:
    port: ${MACHINE_SERVICE_INSTANCE_PORT:8084}
    servlet:
      context-path: /
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name:machine-service}

logging:
  level:
    com.smartgym: DEBUG
    org.springframework: INFO
