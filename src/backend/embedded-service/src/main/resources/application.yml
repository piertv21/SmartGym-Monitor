server:
  port: ${EMBEDDED_SERVICE_INSTANCE_PORT:8088}

spring:
  application:
    name: ${EMBEDDED_SERVICE_INSTANCE_HOSTNAME:embedded-service}
  data:
    mongodb:
      uri: ${EMBEDDED_MONGODB_URI:mongodb://localhost:27022/embeddedservicedb}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://service-discovery:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EMBEDDED_SERVICE_INSTANCE_HOSTNAME:embedded-service}
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}

management:
  server:
    port: ${EMBEDDED_SERVICE_INSTANCE_PORT:8088}
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name:embedded-service}

logging:
  level:
    com.smartgym: DEBUG
    org.springframework: INFO

area-service:
  base-url: ${AREA_SERVICE_BASE_URL:http://area-service:8086}

analytics-service:
  base-url: ${ANALYTICS_SERVICE_BASE_URL:http://analytics-service:8085}

machine-service:
  base-url: ${MACHINE_SERVICE_BASE_URL:http://machine-service:8084}

tracking-service:
  base-url: ${TRACKING_SERVICE_BASE_URL:http://tracking-service:8087}
