server:
  port: ${EMBEDDED_SERVICE_INSTANCE_PORT:8086}

spring:
  application:
    name: embedded-service
  data:
    mongodb:
      uri: ${EMBEDDED_MONGODB_URI:mongodb://localhost:27022/embeddedservicedb}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://service-discovery:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EMBEDDED_SERVICE_INSTANCE_HOSTNAME:embedded-service}
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}

management:
  server:
    port: ${EMBEDDED_SERVICE_INSTANCE_PORT:8086}
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name:embedded-service}
